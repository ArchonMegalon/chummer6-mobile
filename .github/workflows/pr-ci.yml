name: Pull request CI

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: mobile-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  package-plane-and-campaign-journey:
    name: Strict package plane and campaign journey
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      CHUMMER_VERIFY_MODE: integration
      CHUMMER_ALLOW_STUB_PACKAGES: "0"
      CHUMMER_VERIFY_RUN_ID: pr-${{ github.run_id }}-${{ github.run_attempt }}
      CHUMMER_PUBLISHED_ENGINE_CONTRACTS_VERSION: 5.225.1-ci.6f7cc7d8
      CHUMMER_PACKAGE_PLANE_LOCAL_FEED: ${{ github.workspace }}/.ci/chummer-package-feed
      CHUMMER_PACKAGE_PLANE_LOCK_FILE: ${{ github.workspace }}/.ci/chummer-package-plane/with-package-plane.lock
      CHUMMER_PACKAGE_PLANE_ATTESTATION_FILE: ${{ github.workspace }}/.ci/chummer-package-plane/restore-attestation.v1
      NUGET_PACKAGES: ${{ github.workspace }}/.ci/nuget-packages
      DOTNET_CLI_HOME: ${{ github.workspace }}/.ci/dotnet-home
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Check out Mobile pull request
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          path: chummer6-mobile
          persist-credentials: false

      - name: Check out pinned Core package owner
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          repository: ArchonMegalon/chummer6-core
          ref: 6f7cc7d8a81ac5eade01f1457748d34ff1b08ca5
          path: chummer-core-engine
          persist-credentials: false

      - name: Check out pinned Hub contract owners
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          repository: ArchonMegalon/chummer6-hub
          ref: 213ec29e4467867971daf2402af32304f3947a29
          path: chummer.run-services
          persist-credentials: false

      - name: Check out pinned UI Kit package owner
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          repository: ArchonMegalon/chummer6-ui-kit
          ref: d51ecd99cf72098d4adc8db0192bff7bf9fd8e61
          path: chummer-ui-kit
          persist-credentials: false

      - name: Install pinned .NET SDK
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: 10.0.103

      - name: Install pinned Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: 3.12.13

      - name: Install deterministic browser-test tools
        run: |
          python -m pip install --disable-pip-version-check pytest==9.0.2 playwright==1.60.0
          python -m playwright install --with-deps chromium

      - name: Build Web against the strict no-stub package plane
        working-directory: chummer6-mobile
        run: |
          bash scripts/ai/with-package-plane.sh build src/Chummer.Play.Web/Chummer.Play.Web.csproj --nologo
          source_attestation="${CHUMMER_PACKAGE_PLANE_ATTESTATION_FILE}.source"
          test -f "${source_attestation}"
          grep -Fx 'verification_mode=integration' "${source_attestation}"
          grep -Fx 'source_kind=owner' "${source_attestation}"
          grep -Fx 'stub_packages_used=false' "${source_attestation}"
          if grep -Fx 'package_inventory_sha256=missing' "${source_attestation}"; then
            echo 'strict package inventory is missing' >&2
            exit 1
          fi
          for owner_checkout in ../chummer-core-engine ../chummer.run-services ../chummer-ui-kit; do
            if test -n "$(git -C "${owner_checkout}" status --porcelain --untracked-files=all)"; then
              echo "owner checkout changed while producing packages: ${owner_checkout}" >&2
              git -C "${owner_checkout}" status --short
              exit 1
            fi
          done

      - name: Run four-identity campaign browser journey
        working-directory: chummer6-mobile
        run: |
          node --check src/Chummer.Play.Web/wwwroot/mobile-campaign.js
          python -m pytest -q tests/test_mobile_campaign_collaboration_runtime.py
