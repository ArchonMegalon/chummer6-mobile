<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0f1b26" />
  <title>Chummer Play Shell</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <style>
    body { font-family: sans-serif; margin: 0; padding: 16px; background: #0f1b26; color: #f5f7fa; }
    main { max-width: 720px; margin: 0 auto; }
    pre { overflow-x: auto; padding: 12px; border-radius: 8px; background: #1a2c3a; }
    .hint { color: #b7c7d6; }
  </style>
</head>
<body>
<main>
  <h1>Chummer Play</h1>
  <p class="hint">Installable play shell with deep-link resume ownership.</p>
  <pre id="output">Loading resume payload...</pre>
</main>
<script>
  async function boot() {
    if ("serviceWorker" in navigator) {
      try {
        await navigator.serviceWorker.register("/service-worker.js", { scope: "/" });
      } catch (error) {
        console.error("service worker registration failed", error);
      }
    }

    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get("sessionId") || "session-main";
    const role = params.get("role") || "Player";

    try {
      const response = await fetch(`/api/play/resume/${encodeURIComponent(sessionId)}?role=${encodeURIComponent(role)}`);
      const payload = await response.json();
      document.getElementById("output").textContent = JSON.stringify(payload, null, 2);
    } catch (error) {
      document.getElementById("output").textContent = `Resume failed: ${String(error)}`;
    }
  }

  boot();
</script>
</body>
</html>
