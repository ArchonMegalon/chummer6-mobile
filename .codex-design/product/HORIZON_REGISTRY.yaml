product: chummer
version: 2
purpose: Canonical machine-readable horizon registry for downstream guide generation and future build alignment.
rules:
- Downstream generators must source horizon existence, order, and public eligibility from this file.
- Horizon docs in `products/chummer/horizons/*.md` remain the long-form human-readable canon.
- A horizon listed here may be a future-capability lane or a shipped-mvp lane; shipment claims still require executable proof and aligned closure artifacts.
- A horizon must define an eventual build path before it is treated as more than public storytelling.
- A horizon does not count as flagship or near-term release scope until its build path advances beyond `horizon`, its owner handoff gate is materially satisfied, and owning repos can cite executable proof instead of public-guide ambition.
- Open flagship blockers and lived-system release blockers outrank horizon storytelling; horizons must not dilute or outrun current release truth.
- Human-readable narration of these rules lives in `products/chummer/HORIZON_PROMOTION_RULES.md`; narrative copy must stay aligned with this registry.
- Public horizon copy and media must follow `products/chummer/HORIZON_DESIGN_INSTRUCTIONS.md`: human value first, no repo-speak, no foundation-code checklists, and scene-fit AR only.
optional_fields:
- family
- wow_promise
- table_scene
- success_signals
- artifact_types
- public_reader_contract
- media_scene_contract
- public_signal_eligible
- owner_handoff_gate
- access_posture
- resource_burden
- booster_nudge
- free_later_intent
- recognition_eligible
