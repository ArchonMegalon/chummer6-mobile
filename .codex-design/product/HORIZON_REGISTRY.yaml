- id: origin-dossier
  title: ORIGIN DOSSIER
  status: shipped_mvp
  family: origin_canon_and_living_dossier
  canon_doc: products/chummer/horizons/origin-dossier.md
  public_guide:
    enabled: true
    order: 25
    group: core_product
  pain_label: A runner can start as math before they feel like a person.
  wow_promise: The player gets an accepted origin story, portraits, narration, and later ALICE context without letting backstory prose rewrite the sheet.
  table_scene: A player drafts a troll decker, the GM adds a clinic-favor constraint, and Chummer turns the approved origin into a dossier bundle that ALICE can use later.
  build_path:
    intent: eventual_product_lane
    current_state: shipped_mvp
    next_state: flagship_depth_hardening
  owning_repos:
  - chummer6-ui
  - chummer6-core
  - chummer6-hub
  - chummer6-media-factory
  allowed_surfaces:
  - desktop_alice_origin_dossier
  - origin_canon_bundle
  - dossier_media_packet
  - alice_followup_context
  - player_scoped_origin_audiobook
  proof_gate: Origin Dossier packets must prove approved canon, mechanics snapshot lineage, GM/player approval, provider export validation, media provenance, scoped audiobook access, and non-mutating mechanics posture before any public claim widens.
  public_claim_posture: Public copy may describe Origin Dossier as a shipped desktop ALICE lane for approved origin canon, dossier-media packets, and optional player-scoped origin-story audiobooks; it must not claim mechanical mutation, automatic legality, provider-owned character truth, or broad Audiobookshelf access.
  stop_condition: Stop promotion if approved canon can mutate sheet mechanics, if GM steer becomes automatic entitlement, if provider output loses source or approval lineage, or if the desktop can reach a global Audiobookshelf library instead of a scoped EA reference.
  milestone_family: H3
  release_blocking: false
  foundations:
  - D0
  - D2
  - C1
  - E2b
  tool_posture:
    promoted:
    - ALICE
    bounded:
    - Subscribr.ai
    - First Book ai
    - vidBoard
    - MagicFit
    - Unmixr AI
    - MarkupGo
    - PeekShot
  success_signals:
  - Blank-state and active-runner origin drafts can become approved canon without hidden sheet mutation.
  - GM allowances and hard requirements remain advisory until normal character editing commits matching mechanics.
  - Dossier media and narration packets preserve source hashes, approval state, selected assets, provider receipts, and render receipts.
  - Later ALICE answers can reference approved origin canon while still citing Chummer-owned mechanics truth for rules claims.
  artifact_types:
  - approved origin canon
  - origin dossier bundle
  - dossier PDF
  - portrait candidate set
  - scene candidate set
  - narration packet
  - origin-story audiobook reference
  - video storyboard
  - media-factory request
  public_signal_eligible: true
  access_posture: booster_first
  resource_burden: medium
  booster_nudge: Origin canon, portrait, narration, audiobook, and video packets need review and media effort, so broad automated rendering should wait behind approved bundle lineage.
  free_later_intent: Long-run intent is broad access after bundle approval, provider retention, media lineage, scoped audiobook access, and non-mutating ALICE follow-up prove stable.
  recognition_eligible: true
  owner_handoff_gate: Origin Dossier must remain downstream of runner dossier identity and upstream of media packets, while core mechanics truth stays in Chummer-owned engine receipts.
