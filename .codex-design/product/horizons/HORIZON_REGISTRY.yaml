purpose: Derived machine-readable registry for public-guide routing and future-capability lanes. The root HORIZON_REGISTRY.yaml is the canonical source of truth.

foundation_capabilities:
  - id: expert_speed_substrate
    summary: Explicit latency budgets, keyboard seams, batch-safe edits, undo, and dense-state performance.
  - id: edition_expression_substrate
    summary: Ruleset-specific terminology, composition seams, inspectors, and theming without flattening SR4, SR5, and SR6.
  - id: guided_mastery_substrate
    summary: Explain, legality, sample-build, and recommendation seams that can support coaching without inventing truth.
  - id: gm_operations_substrate
    summary: Campaign, roster, recap, device-role, and prep/run state strong enough for real table operations.
  - id: continuity_and_degraded_state_substrate
    summary: Offline, reconnect, receipt, replay, and conflict-resolution posture that remains trustworthy under stress.
  - id: publication_and_prestige_substrate
    summary: Preview-first publication, manifests, provenance, theming, and premium artifact rendering.
  - id: evaluation_substrate
    summary: Import oracles, user-facing acceptance gates, and machine-readable proof surfaces.

